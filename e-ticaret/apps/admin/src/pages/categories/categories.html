<app-blank pageTitle="Kategoriler" [breadcrumbs]="[{title: 'Kategoriler', url: '/categories', icon: 'category'}]" />

<flexi-grid [data]="data()" [loading]="loading()" language="tr" [showCaption]="true" captionTitle="Kategoriler"
    [showExportExcelBtn]="true" exportExcelFileName="Kategoriler" (onRefresh)="result.reload()">
    <ng-template>
        <flexi-button routerLink="/categories/create" btnIcon="plus" btnColor="success" title="Kategori Ekle" flexiTooltip/>
    </ng-template>
    <flexi-grid-column field="name" title="Kategori Adı" />
    <ng-template flexiGridColumnCommandTemplate let-item>
        <flexi-button [routerLink]="['/categories', 'edit', item.id]" btnIcon="edit" btnColor="info" title="Güncelle" flexiTooltip/>
        <flexi-button (click)="delete(item.id)" btnIcon="trash" btnColor="danger" title="Sil" flexiTooltip/>
    </ng-template>
</flexi-grid>
